name: Build Python Executable ARM
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install httpx beautifulsoup4 python-telegram-bot pyinstaller
      - run: pyinstaller --onefile --name dhekzBot index.py
      - uses: actions/upload-artifact@v4
        with:
          name: dhekzBot-linux-arm
          path: dist/dhekzBot
